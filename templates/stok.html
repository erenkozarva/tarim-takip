{% extends 'base.html' %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-box-seam"></i> Tarım Stok Durumu</h2>
    <a href="/stok/ekle" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Yeni Malzeme Ekle</a>
</div>

<div class="mb-3">
    <input type="text" data-table="stok-table" class="form-control" placeholder="Malzeme adı veya türü ile ara...">
</div>

<div class="card">
    <div class="card-body p-0">
        <table id="stok-table" class="table table-hover mb-0">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Malzeme</th>
                    <th>Tür</th>
                    <th>Stok Adedi</th>
                    <th>Birim Fiyat (TL)</th>
                    <th>Toplam Değer (TL)</th>
                </tr>
            </thead>
            <tbody>
                {% for s in stoklar %}
                <tr>
                    <td>{{ s[0] }}</td>
                    <td>{{ s[1] }}</td>
                    <td><span class="badge bg-secondary">{{ s[2] }}</span></td>
                    <td>{{ s[3] }}</td>
                    <td>{{ s[4] }} ₺</td>
                    <td>{{ s[3] * s[4] }} ₺</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
