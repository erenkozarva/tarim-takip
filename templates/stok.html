{% extends 'base.html' %}
{% block content %}

<div class="mb-4">
    <h2><i class="bi bi-box-seam"></i> Tarım Stok Durumu</h2>
</div>

<div class="card">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Malzeme</th>
                    <th>Tür</th>
                    <th>Stok Adedi</th>
                    <th>Birim Fiyat (TL)</th>
                    <th>Toplam Değer (TL)</th>
                </tr>
            </thead>
            <tbody>
                {% for s in stoklar %}
                <tr>
                    <td>{{ s[0] }}</td>
                    <td>{{ s[1] }}</td>
                    <td><span class="badge bg-secondary">{{ s[2] }}</span></td>
                    <td>{{ s[3] }}</td>
                    <td>{{ s[4] }} ₺</td>
                    <td>{{ s[3] * s[4] }} ₺</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
