{% extends 'base.html' %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-plus-lg"></i> Yeni Malzeme Ekle</h2>
    <a href="/stok" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Geri</a>
</div>

<div class="card p-4" style="max-width:600px;">
    <form method="POST">
        <div class="mb-3">
            <label class="form-label fw-semibold">Malzeme Adı</label>
            <input type="text" name="malzeme_adi" class="form-control" placeholder="Örn: DAP Gübre" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Tür</label>
            <select name="tur" class="form-select" required>
                <option value="">Seçiniz...</option>
                <option value="gubre">Gübre</option>
                <option value="ilac">İlaç</option>
                <option value="tohum">Tohum</option>
                <option value="yakit">Yakıt</option>
                <option value="ekipman">Ekipman</option>
                <option value="yem">Yem</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Stok Adedi</label>
            <input type="number" name="stok_adet" class="form-control" min="0" value="0" required>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold">Birim Fiyat (₺)</label>
            <input type="number" name="birim_fiyat" class="form-control" step="0.01" min="0" placeholder="0.00">
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-bold">
            <i class="bi bi-save"></i> Kaydet
        </button>
    </form>
</div>

{% endblock %}
