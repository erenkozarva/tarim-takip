{% extends 'base.html' %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-person-plus"></i> Yeni Çiftçi Ekle</h2>
    <a href="/ciftciler" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Geri</a>
</div>

<div class="card p-4" style="max-width:600px;">
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">TC No</label>
            <input type="text" name="tc_no" class="form-control" maxlength="11" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Ad</label>
            <input type="text" name="ad" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Soyad</label>
            <input type="text" name="soyad" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Telefon</label>
            <input type="text" name="tel_no" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Doğum Tarihi</label>
            <input type="date" name="dogum_tar" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary w-100">Kaydet</button>
    </form>
</div>

{% endblock %}
