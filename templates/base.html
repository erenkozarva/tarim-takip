<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tarım Takip Sistemi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f5f7f2; }
        .navbar { background-color: #2d6a2d; }
        .navbar-brand, .nav-link { color: #fff !important; }
        .nav-link:hover { color: #c8e6c9 !important; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .stat-card { border-left: 4px solid #2d6a2d; }
        .stat-card .display-6 { color: #2d6a2d; font-weight: bold; }
        .btn-primary { background-color: #2d6a2d; border-color: #2d6a2d; }
        .btn-primary:hover { background-color: #1e4d1e; border-color: #1e4d1e; }
        .table thead { background-color: #2d6a2d; color: white; }
        h2 { color: #2d6a2d; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="bi bi-flower1"></i> Tarım Takip</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house"></i> Ana Sayfa</a></li>
                <li class="nav-item"><a class="nav-link" href="/ciftciler"><i class="bi bi-people"></i> Çiftçiler</a></li>
                <li class="nav-item"><a class="nav-link" href="/tarlalar"><i class="bi bi-map"></i> Tarlalar</a></li>
                <li class="nav-item"><a class="nav-link" href="/ekim"><i class="bi bi-calendar3"></i> Ekim/Hasat</a></li>
                <li class="nav-item"><a class="nav-link" href="/satislar"><i class="bi bi-cash-stack"></i> Satışlar</a></li>
                <li class="nav-item"><a class="nav-link" href="/stok"><i class="bi bi-box-seam"></i> Stok</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
